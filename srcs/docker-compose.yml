services:
  mariadb:
    container_name: mariadb
    build: ./requirements/mariadb
    image: mariadb 
    restart: always
    env_file: 
      - .env
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin ping -h localhost -u root -p$${MYSQL_ROOT_PASSWORD} || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - inception
    volumes:
      - mariadb:/var/lib/mysql

#TODO: check why other have more stuff for image.

  nginx:
    container_name: nginx
    build: ./requirements/nginx
    image: nginx
    restart: always
    env_file: 
      - .env
    depends_on:
      wordpress:
        condition: service_healthy
    ports:
      - "443:443"
    networks:
      - inception
    volumes:
      - wordpress:/var/www/html

  wordpress:
    container_name: wordpress
    build: ./requirements/wordpress
    image: wordpress
    restart: always
    env_file: 
      - .env
    depends_on:
      mariadb:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "test -f /var/www/html/wp-config.php && pgrep php-fpm || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - inception
    volumes:
      - wordpress:/var/www/html

networks:
  inception:
    driver: bridge

volumes:
  mariadb:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/${LOGIN}/data/mariadb
  wordpress:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/${LOGIN}/data/wordpress
