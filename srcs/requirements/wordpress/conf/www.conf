[www]

user = www-data
group = www-data

listen = 0.0.0.0:9000

pm = dynamic
pm.max_children = 5
pm.start_servers = 2
pm.min_spare_servers = 1
pm.max_spare_servers = 3

clear_env = no 
# TODO : this was added planning to read passwords directly from the environment at runtime 
# without hardcoding them to wp-config.php during container boot up.